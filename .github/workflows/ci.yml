name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (unused imports)
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters

      - name: Test
        run: npx jest --ci --passWithNoTests
